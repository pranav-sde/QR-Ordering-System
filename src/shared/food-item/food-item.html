<div class="glass-card fade-in-entry max-w-sm rounded-3xl transition-all duration-300 h-full flex flex-col">

  <div class="item-image-container h-48 relative shrink-0">
    <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent z-10 opacity-60"></div>
    <img [src]="foodItem.image" alt="{{foodItem.name}}" class="item-image w-full h-full object-cover">

    <!-- Floating Add Button -->
    <button (click)="addToCart(foodItem)" class="btn-floating-add absolute bottom-4 right-4 z-20 cursor-pointer">
      <span class="material-icons text-xl">add</span>
    </button>
  </div>

  <div class="p-5 flex flex-col flex-grow gap-2">
    <div class="flex justify-between items-start gap-2">
      <h3 class="item-name text-lg font-bold leading-tight line-clamp-1">{{ foodItem.name }}</h3>
      <!-- Veg/Non-Veg Icon -->
      <div [class]="foodItem.veg ? 'veg-indicator-container' : 'non-veg-indicator-container'" class="mt-1 shrink-0">
        <div [class]="foodItem.veg ? 'bg-green-600' : 'bg-red-600'" class="w-2 h-2 rounded-full"></div>
      </div>
    </div>

    <p class="text-xs text-gray-400 font-medium leading-relaxed line-clamp-2 min-h-[32px]">
      {{ foodItem.description }}
    </p>

    <div class="flex items-center justify-between mt-auto pt-4">
      <div class="price-container">
        <span class="text-xs font-normal opacity-70 mr-0.5">₹</span>{{ foodItem.price }}
      </div>
      <div class="flex items-center gap-1 opacity-40">
        <span class="material-icons text-[10px]">timer</span>
        <span class="text-[9px] font-bold uppercase tracking-widest">15 MIN</span>
      </div>
    </div>
  </div>
</div>
