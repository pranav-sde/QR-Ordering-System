<section class="flex flex-row items-center justify-center w-full md:mt-[150px] mt-[30px]">
  <div class=" container-full container-mobile flex flex-row justify-between items-center">
    <div class="border border-gray-200 rounded-full flex items-center justify-between p-1 md:w-[30%] w-[70%]">
      <input type="email"
             (input)="searchMenu($event)"
             placeholder="Search for menu"
             class="text-xs pl-3 placeholder:text-xm placeholder:p-2 focus:outline-hidden rounded-full p-[1.5px] w-full md:w-auto">
      <button class="bg-[#090A0F] text-xs text-white/90 px-3 py-2 cursor-pointer rounded-2xl m-1">Search</button>
    </div>

    <div>
      <p class="text-sm text-gray-500 cursor-pointer">Sort by :</p>
    </div>
  </div>
</section>

<section class="w-full md:mt-[50px] mt-[50px] overflow-hidden">
  @defer (when !isLoading()) {
    <div class="flex justify-center">
      <div class="grid grid-cols-2 gap-4 md:grid-cols-4 container-full container-mobile w-full">
        @for (item of filteredFoodItems(); track item.id) {
          <app-food-item
            [foodItem]="item"
            (handleAdd)="addItemToCart($event)"
          >
          </app-food-item>
        }
      </div>
    </div>
  } @placeholder {
    <div class="flex justify-center w-full" animate.leave="fadeout-skeleton">
      <div class="grid grid-cols-2 gap-4 md:grid-cols-4 container-full container-mobile w-full">
        @for (_ of [1, 2, 3, 4, 5, 6, 7, 8]; track _) {
          <div class="skeleton">
            <div class="food-image"></div>
            <div class="text title"></div>
            <div class="text subtitle"></div>
          </div>
        }
      </div>
    </div>
  }
</section>
