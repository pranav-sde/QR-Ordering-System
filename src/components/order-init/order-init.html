<div class="min-h-screen flex items-center justify-center bg-base-200">
  <div class="max-w-md w-full p-8 bg-base-100 rounded-3xl shadow-2xl text-center space-y-6 animate-fade-in">
    @if (isLoading()) {
      <div class="flex flex-col items-center space-y-4">
        <span class="loading loading-spinner loading-lg text-primary"></span>
        <h2 class="text-2xl font-bold">Initializing Order Flow</h2>
        <p class="text-base-content/70">Connecting with restaurant #{{restaurantId()}} - Table #{{tableId()}}</p>
      </div>
    } @else if (error()) {
      <div class="flex flex-col items-center space-y-4">
        <div class="bg-error/10 text-error p-4 rounded-full">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-error">Access Denied</h2>
        <p class="text-base-content/70">{{errorMessage()}}</p>
        <button class="btn btn-primary btn-block text-white" (click)="retry()">
          Retry Connection
        </button>
      </div>
    } @else {
      <div class="flex flex-col items-center space-y-4">
        <div class="bg-success/10 text-success p-4 rounded-full">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <h2 class="text-2xl font-bold">Success!</h2>
        <p class="text-base-content/70">Redirecting to menu for table #{{tableId()}}...</p>
      </div>
    }
  </div>
</div>
