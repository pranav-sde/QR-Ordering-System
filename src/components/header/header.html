<section
  class="flex items-center justify-center flex-col w-full fixed top-0 backdrop-blur-md z-50 text-center glass-effect border-b border-gray-200/50">
  <!-- Top Announcement Bar -->
  <div class="w-full bg-[#090A0F] text-white py-2 px-4 shadow-sm">
    <div
      class="max-w-7xl mx-auto flex justify-center items-center gap-4 text-[11px] font-bold uppercase tracking-[0.2em]">
      <span class="flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 bg-yellow-400 rounded-full animate-pulse"></span>
        Live Menu
      </span>
      <span class="opacity-30">|</span>
      <span>Quick Ordering Enabled</span>
      <span class="opacity-30">|</span>
      <span class="text-yellow-400">Scan. Order. Enjoy.</span>
    </div>
  </div>

  <div class="w-full max-w-7xl px-4 md:px-8 py-3">
    <div class="flex flex-row justify-between items-center">
      <!-- Logo -->
      <div class="flex items-center gap-2 cursor-pointer group" routerLink="/">
        <div
          class="w-8 h-8 bg-[#090A0F] rounded-xl flex items-center justify-center group-hover:rotate-12 transition-transform duration-300">
          <span class="material-icons text-white text-lg">restaurant_menu</span>
        </div>
        <p class="bebas-neue-regular text-2xl tracking-tighter text-[#090A0F]">ScanEats</p>
      </div>

      <!-- Mobile Controls -->
      <div class="flex items-center gap-3 md:hidden">
        <button routerLink="/orders"
          class="bg-indigo-600/10 text-indigo-600 p-2 rounded-xl active:scale-95 transition-all">
          <i class="material-icons text-xl">receipt_long</i>
        </button>


        @if (ui.showCart()) {
        <button routerLink="cart"
          class="relative bg-[#090A0F] text-white p-2 rounded-xl active:scale-95 transition-all">
          <i class="material-icons text-xl">shopping_cart</i>
          @if (cartCount$ | async) {
          <span
            class="absolute -top-1.5 -right-1.5 bg-yellow-400 text-black text-[10px] font-black rounded-full h-5 w-5 flex items-center justify-center border-2 border-white">
            {{ cartCount$ | async }}
          </span>
          }
        </button>
        }

        <button class="p-2 text-[#090A0F]">
          <span class="material-icons text-2xl">menu</span>
        </button>
      </div>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex gap-8 items-center">
        <div class="flex gap-6 text-sm font-semibold text-gray-500">
          <a routerLink="/menu" class="hover:text-black transition-colors cursor-pointer capitalize">Menu</a>
          <a routerLink="/orders" class="hover:text-black transition-colors cursor-pointer capitalize">Orders</a>
        </div>

        <div class="h-6 w-[1px] bg-gray-200 mx-2"></div>

        <div class="flex items-center gap-4">
          @if (getLastOrderId()) {
          <button [routerLink]="['/order', getLastOrderId()]"
            class="text-xs font-bold uppercase tracking-wider text-indigo-600 hover:text-indigo-700 transition-colors flex items-center gap-2">
            <span class="material-icons text-sm">receipt_long</span>
            My Order
          </button>
          }

          @if (ui.showCart()) {
          <button routerLink="cart"
            class="relative flex items-center gap-2 bg-[#090A0F] text-white px-5 py-2.5 rounded-2xl font-bold text-sm hover:bg-gray-800 transition-all active:scale-95 shadow-lg shadow-black/10">
            <i class="material-icons text-lg">shopping_cart</i>
            <span>Cart</span>
            @if (cartCount$ | async) {
            <span
              class="bg-yellow-400 text-black text-[10px] font-black rounded-full h-5 px-1.5 flex items-center justify-center">
              {{ cartCount$ | async }}
            </span>
            }
          </button>
          }
        </div>
      </nav>
    </div>
  </div>
</section>
